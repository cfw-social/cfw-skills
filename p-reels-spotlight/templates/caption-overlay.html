<template id="caption-overlay-template">
  <!--
    p-reels-fmt3 v0.5 — kinetic caption overlay (FILLED, never authored).

    One caption group visible at a time, word-synced karaoke baseline, the
    planner-flagged emphasis word gets the accent treatment (color + scale pop
    + glow). Entrance style cycles per group (planner sets style 0/1/2).
    Deterministic — no Math.random, every group hard-killed at group.end.

    Placeholders:
      DURATION    — full reel duration (seconds)
      ACCENT      — brand accent hex (the keyword color)
      FG          — foreground text hex
      GROUPS_JSON — JSON array:
        [{ "start":s, "end":s, "style":0|1|2,
           "words":[{ "w":"TEXT", "s":start, "e":end, "em":true|false }] }]
  -->
  <div
    id="caption-overlay"
    data-composition-id="caption-overlay"
    data-width="1080"
    data-height="1920"
  >
    <style>
      #caption-overlay {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: transparent;
        font-family: 'Oswald', sans-serif;
      }
      /* Lower-middle band (~640px from the bottom) — clear of the face. Full-width
         absolute container; NEVER left:50%+translate (clips at composition edges). */
      #caption-overlay .cap-group {
        position: absolute;
        left: 0;
        right: 0;
        top: 1180px;
        height: 260px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        column-gap: 0.42em;
        row-gap: 0.05em;
        padding: 0 60px;
        text-align: center;
        opacity: 0;
        overflow: visible;
      }
      #caption-overlay .cap-word {
        display: inline-block;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.01em;
        line-height: 1.04;
        color: {{FG}};
        opacity: 0.42;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.75);
        will-change: transform, opacity;
      }
      #caption-overlay .cap-word.em {
        font-weight: 700;
        color: {{ACCENT}};
        /* breathing room — the scale pop must not eat the neighbor gaps */
        margin: 0 0.06em;
      }
    </style>

    <script src="gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};

      var GROUPS = {{GROUPS_JSON}};
      var ACCENT = "{{ACCENT}}";
      var FG = "{{FG}}";

      var root = document.getElementById("caption-overlay");

      // Build the DOM synchronously at init — every group exists before the
      // capture engine reads the timeline.
      GROUPS.forEach(function (group, gi) {
        var g = document.createElement("div");
        g.className = "cap-group";
        g.id = "cg-" + gi;
        var text = group.words.map(function (w) { return w.w; }).join(" ");
        var fit = window.__hyperframes && window.__hyperframes.fitTextFontSize
          ? window.__hyperframes.fitTextFontSize(text.toUpperCase(), {
              fontFamily: "Oswald",
              fontWeight: 700,
              maxWidth: 760, /* 900 safe width / 1.18 max emphasis scale */
              baseFontSize: 88,
              minFontSize: 48,
            })
          : { fontSize: 72 };
        g.style.fontSize = fit.fontSize + "px";
        group.words.forEach(function (w, wi) {
          var s = document.createElement("span");
          s.className = "cap-word" + (w.em ? " em" : "");
          s.id = "cw-" + gi + "-" + wi;
          s.textContent = w.w;
          g.appendChild(s);
        });
        root.appendChild(g);
      });

      var tl = gsap.timeline({ paused: true });

      GROUPS.forEach(function (group, gi) {
        var sel = "#cg-" + gi;
        var dur = Math.max(0.2, group.end - group.start);
        var style = group.style % 3;

        // ── Entrance (cycled per group so no two adjacent groups repeat) ──
        if (style === 0) {
          tl.fromTo(sel, { opacity: 0, scale: 0.9, y: 26 },
            { opacity: 1, scale: 1, y: 0, duration: 0.3, ease: "back.out(1.7)" }, group.start);
        } else if (style === 1) {
          tl.fromTo(sel, { opacity: 0, x: -44 },
            { opacity: 1, x: 0, duration: 0.28, ease: "power3.out" }, group.start);
        } else {
          tl.fromTo(sel, { opacity: 0, y: 54 },
            { opacity: 1, y: 0, duration: 0.32, ease: "power4.out" }, group.start);
        }

        // ── Karaoke: each word brightens at its own timestamp ──
        group.words.forEach(function (w, wi) {
          var wsel = "#cw-" + gi + "-" + wi;
          var at = Math.max(w.s, group.start + 0.02);
          if (w.em) {
            // Emphasis word: accent pop + glow — clearly breaks the pattern.
            tl.fromTo(wsel, { scale: 0.72, opacity: 0.42 },
              { scale: 1.16, opacity: 1, duration: 0.26, ease: "back.out(2.2)" }, at);
            tl.to(wsel, {
              textShadow: "0 0 26px " + ACCENT + "AA, 0 4px 24px rgba(0,0,0,0.75)",
              duration: 0.2, ease: "power2.out",
            }, at);
            tl.to(wsel, { scale: 1.08, duration: 0.18, ease: "power2.inOut" }, at + 0.26);
          } else {
            tl.to(wsel, { opacity: 1, duration: 0.14, ease: "power1.out" }, at);
          }
        });

        // ── Exit + deterministic hard kill ──
        tl.to(sel, { opacity: 0, scale: 0.95, duration: 0.12, ease: "power2.in" },
          Math.max(group.start + 0.12, group.end - 0.12));
        tl.set(sel, { opacity: 0, visibility: "hidden" }, group.end);
      });

      // Self-lint: every group must be gone just past its end.
      GROUPS.forEach(function (group, gi) {
        var el = document.getElementById("cg-" + gi);
        if (!el) return;
        tl.seek(Math.min(group.end + 0.01, {{DURATION}}));
        /* bare getComputedStyle, NOT window.getComputedStyle — the sub-composition
           sandbox proxies `window` without binding methods (Illegal invocation) */
        var c = getComputedStyle(el);
        if (c.opacity !== "0" && c.visibility !== "hidden") {
          console.warn("[caption-lint] group " + gi + " still visible at t=" + (group.end + 0.01).toFixed(2) + "s");
        }
      });
      tl.seek(0);

      window.__timelines["caption-overlay"] = tl;
    </script>
  </div>
</template>
