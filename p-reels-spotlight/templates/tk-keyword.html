<template id="{{ID}}-template">
  <!--
    p-reels-fmt3 v0.5 — takeover template: GIANT KEYWORD SLAM (filled, never authored).
    Opaque full-frame card: one oversized keyword slams in over a ghost echo and
    seeded drifting particles; a short support line lands under it.
    Content lives in the TOP ~55% (the caption band sits lower).

    Placeholders: ID DURATION BG ACCENT FG
                  WORD SUPPORT
    ACCENT must be a 6-digit hex — alpha is appended as hex pairs below.
  -->
  <div
    id="{{ID}}"
    data-composition-id="{{ID}}"
    data-width="1080"
    data-height="1920"
  >
    <style>
      #{{ID}} {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: {{BG}};
        font-family: 'Oswald', sans-serif;
      }
      #{{ID}} .leak {
        position: absolute;
        left: -300px; top: -200px;
        width: 900px; height: 900px;
        background: radial-gradient(circle, {{ACCENT}}26 0%, transparent 60%);
        will-change: transform, opacity;
      }
      #{{ID}} .ghost {
        position: absolute;
        left: 50%; top: 30%;
        transform: translate(-50%, -50%);
        font-weight: 700; font-size: 380px; line-height: 0.85;
        letter-spacing: -0.02em; text-transform: uppercase;
        color: transparent;
        -webkit-text-stroke: 2px {{FG}}14;
        white-space: nowrap;
        will-change: transform, opacity;
      }
      #{{ID}} .particle {
        position: absolute;
        border-radius: 50%;
        background: {{ACCENT}};
        will-change: transform, opacity;
      }
      #{{ID}} .content {
        position: absolute; left: 0; right: 0; top: 14%;
        max-height: 48%;
        display: flex; flex-direction: column; align-items: center;
        gap: 44px;
        padding: 0 60px;
        text-align: center;
        box-sizing: border-box;
      }
      #{{ID}} .word {
        font-weight: 700; line-height: 0.92;
        letter-spacing: -0.02em; text-transform: uppercase;
        color: {{ACCENT}};
        text-shadow: 0 0 70px {{ACCENT}}66;
        will-change: transform, opacity;
      }
      #{{ID}} .support {
        font-family: 'Inter', sans-serif;
        font-weight: 700; font-size: 52px; line-height: 1.15;
        color: {{FG}};
        max-width: 880px;
        will-change: transform, opacity;
      }
    </style>

    <div class="leak js-leak"></div>
    <div class="ghost js-ghost">{{WORD}}</div>
    <div class="content">
      <div class="word js-word" id="{{ID}}-word">{{WORD}}</div>
      <div class="support js-support">{{SUPPORT}}</div>
    </div>

    <script src="gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var scope = '#{{ID}} ';
        var DUR = parseFloat("{{DURATION}}");
        var root = document.querySelector('#{{ID}}');

        // Fit the keyword to one line.
        var wordEl = document.getElementById("{{ID}}-word");
        var fit = window.__hyperframes && window.__hyperframes.fitTextFontSize
          ? window.__hyperframes.fitTextFontSize(wordEl.textContent.toUpperCase(), {
              fontFamily: "Oswald", fontWeight: 700,
              maxWidth: 940, baseFontSize: 260, minFontSize: 110,
            })
          : { fontSize: 200 };
        wordEl.style.fontSize = fit.fontSize + "px";

        // Seeded particles — deterministic (mulberry32), finite tweens only.
        function mulberry32(a) {
          return function () {
            a |= 0; a = (a + 0x6d2b79f5) | 0;
            var t = Math.imul(a ^ (a >>> 15), 1 | a);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        var rnd = mulberry32(7);
        var particles = [];
        for (var i = 0; i < 14; i++) {
          var p = document.createElement("div");
          p.className = "particle";
          var size = 4 + Math.round(rnd() * 8);
          p.style.width = size + "px";
          p.style.height = size + "px";
          p.style.left = Math.round(rnd() * 1040) + "px";
          p.style.top = Math.round(300 + rnd() * 1100) + "px";
          p.style.opacity = "0";
          root.appendChild(p);
          particles.push({ el: p, drift: 80 + rnd() * 140, delay: rnd() * 0.8 });
        }

        var tl = gsap.timeline({ paused: true });

        // Light leak sweeps across once.
        tl.fromTo(scope + ".js-leak", { x: -200, y: -100, opacity: 0 },
          { x: 700, y: 300, opacity: 1, duration: DUR, ease: "sine.inOut" }, 0);

        // Ghost echo drifts behind.
        tl.fromTo(scope + ".js-ghost", { xPercent: -52, opacity: 0 },
          { xPercent: -48, opacity: 1, duration: DUR, ease: "none" }, 0);

        // Particles float upward and fade.
        particles.forEach(function (p) {
          tl.fromTo(p.el, { y: 0, opacity: 0 },
            { y: -p.drift, opacity: 0.7, duration: DUR * 0.6, ease: "sine.out" }, p.delay);
          tl.to(p.el, { opacity: 0, duration: DUR * 0.3, ease: "power1.in" }, DUR * 0.65);
        });

        // The keyword slam: oversized, then settles hard.
        tl.fromTo(scope + ".js-word", { scale: 3, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.4, ease: "power4.out" }, 0.18);
        tl.to(scope + ".js-word", { scale: 1.04, duration: Math.max(0.4, DUR - 0.8), ease: "sine.inOut" }, 0.7);

        tl.fromTo(scope + ".js-support", { y: 44, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.45, ease: "power3.out" }, 0.55);

        window.__timelines["{{ID}}"] = tl;
      })();
    </script>
  </div>
</template>
